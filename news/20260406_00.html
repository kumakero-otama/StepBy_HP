<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StepByの公式Webサイトを開設しました！ | StepBy</title>
  <link rel="icon" type="image/png" href="../assets/icons/StepBy_tabicon.png">
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="article-page">
  <header class="site-header">
    <div class="site-header__inner">
      <div class="site-header__brand">
        <button
          class="site-header__press-area"
          type="button"
          aria-label="Show version while pressing"
        ></button>
        <a class="site-logo" href="../index.html">StepBy</a>
        <span class="site-version" data-site-version aria-hidden="true"></span>
      </div>

      <div class="site-header__actions">
        <a
          class="header-open-button"
          data-app-link="mapApp"
          href="#"
          target="_blank"
          rel="noreferrer"
        >
          <img src="../assets/icons/open_1fgray.png" alt="" aria-hidden="true">
          <span>StepByを開く</span>
        </a>

        <div class="header-dropdown" data-dropdown>
          <button
            class="header-dropdown__trigger"
            type="button"
            aria-expanded="false"
            aria-haspopup="true"
          >
            <span>文字サイズ</span>
            <strong>小</strong>
            <img
              class="header-dropdown__icon header-dropdown__icon--closed"
              src="../assets/icons/right_white.png"
              alt=""
              aria-hidden="true"
            >
            <img
              class="header-dropdown__icon header-dropdown__icon--open"
              src="../assets/icons/down_white.png"
              alt=""
              aria-hidden="true"
            >
          </button>
          <div class="header-dropdown__menu" role="menu">
            <button class="header-dropdown__item is-selected" type="button" role="menuitem">
              <span>小</span>
              <img src="../assets/icons/check_1fgray.png" alt="" aria-hidden="true">
            </button>
            <button class="header-dropdown__item" type="button" role="menuitem">
              <span>中</span>
            </button>
            <button class="header-dropdown__item" type="button" role="menuitem">
              <span>大</span>
            </button>
          </div>
        </div>

        <div class="header-dropdown" data-dropdown>
          <button
            class="header-dropdown__trigger"
            type="button"
            aria-expanded="false"
            aria-haspopup="true"
          >
            <span>Language</span>
            <strong>日本語</strong>
            <img
              class="header-dropdown__icon header-dropdown__icon--closed"
              src="../assets/icons/right_white.png"
              alt=""
              aria-hidden="true"
            >
            <img
              class="header-dropdown__icon header-dropdown__icon--open"
              src="../assets/icons/down_white.png"
              alt=""
              aria-hidden="true"
            >
          </button>
          <div class="header-dropdown__menu" role="menu">
            <button class="header-dropdown__item is-selected" type="button" role="menuitem">
              <span>日本語</span>
              <img src="../assets/icons/check_1fgray.png" alt="" aria-hidden="true">
            </button>
            <button class="header-dropdown__item" type="button" role="menuitem">
              <span>English</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="article-main">
    <div class="article-main__inner">
      <a class="article-back-link" href="../index.html#news-section">
        <img src="../assets/icons/left_green.png" alt="" aria-hidden="true">
        <span>お知らせ一覧へ戻る</span>
      </a>

      <article class="article-card">
        <h1 class="article-card__title">StepByの公式Webサイトを開設しました！</h1>
        <time class="article-card__date" datetime="2026-04-06">2026.04.06</time>
        <img
          class="article-card__image"
          src="../assets/images/20260406_00.png"
          alt="StepByの公式Webサイトを開設しました！"
        >
        <div class="article-card__content">
          <p>StepByの公式Webサイトを開設いたしました。</p>
          <p>
            StepByとは、視覚障害者向けに点字ブロックなどの地図情報を誰でも記録・共有できるアプリです。
            <a data-app-link="mapApp" href="#" target="_blank" rel="noreferrer">こちらから開けます</a>。
          </p>
          <p>このWebサイトでStepByについての情報や使い方などを発信していきます。よろしくお願いいたします。</p>
        </div>
      </article>
    </div>
  </main>

  <script src="../scripts/site-config.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
