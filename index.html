<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StepBy : 視覚障害者向け地図情報共有アプリ</title>
  <link rel="icon" type="image/png" href="assets/icons/StepBy_tabicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <button
        class="site-header__press-area"
        type="button"
        aria-label="Show version while pressing"
      ></button>
      <a class="site-logo" href="./">StepBy</a>
      <span class="site-version" data-site-version aria-hidden="true"></span>
    </div>
  </header>

  <main class="page-main">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__panel hero__panel--content">
        <div class="hero__content">
          <div class="hero__brand">
            <img
              class="hero__icon"
              src="assets/images/StepBy_icon.webp"
              alt="StepBy icon"
            >
            <h1 id="hero-title" class="hero__title">StepBy</h1>
          </div>

          <div class="hero__text-group">
            <p class="hero__description">
              あなたの一歩が、誰かの道になる。<br>
              視覚障害者向け地図情報投稿アプリ
            </p>

            <a
              class="hero__button"
              data-app-link="mapApp"
              href="#"
              target="_blank"
              rel="noreferrer"
            >
              StepByを開く（インストール不要）
            </a>
          </div>
        </div>
      </div>

      <div class="hero__panel hero__panel--visual">
        <div class="hero__image-card">
          <img
            class="hero__image"
            src="assets/images/UI2_mapscreen.png"
            alt="StepBy map screen"
          >
        </div>
      </div>
    </section>

    <nav class="guide-nav" aria-label="Page sections">
      <div class="guide-nav__inner">
        <a class="guide-nav__item" href="#news-section">
          <span>お知らせ</span>
          <img src="assets/icons/down_1fgray.png" alt="" aria-hidden="true">
        </a>
        <a class="guide-nav__item" href="#">
          <span>StepByとは</span>
          <img src="assets/icons/down_1fgray.png" alt="" aria-hidden="true">
        </a>
        <a class="guide-nav__item" href="#">
          <span>アプリの使い方</span>
          <img src="assets/icons/down_1fgray.png" alt="" aria-hidden="true">
        </a>
        <a class="guide-nav__item" href="#">
          <span>統計</span>
          <img src="assets/icons/down_1fgray.png" alt="" aria-hidden="true">
        </a>
        <a class="guide-nav__item" href="#">
          <span>よくある質問</span>
          <img src="assets/icons/down_1fgray.png" alt="" aria-hidden="true">
        </a>
        <a class="guide-nav__item" href="#">
          <span>スポンサー募集</span>
          <img src="assets/icons/down_1fgray.png" alt="" aria-hidden="true">
        </a>
      </div>
    </nav>

    <section class="news-section" id="news-section" aria-labelledby="news-heading">
      <div class="news-section__inner">
        <h2 class="section-heading" id="news-heading">お知らせ</h2>

        <div class="news-grid">
          <a class="news-card" href="news/20260406_00.html">
            <div class="news-card__image-wrap">
              <img
                class="news-card__image"
                src="assets/images/20260406_00.png"
                alt="StepByの公式Webサイトを開設しました！"
              >
            </div>
            <div class="news-card__body">
              <h3 class="news-card__title">StepByの公式Webサイトを開設しました！</h3>
              <time class="news-card__date" datetime="2026-04-06">2026.04.06</time>
            </div>
          </a>
        </div>
      </div>
    </section>
  </main>

  <button class="back-to-top" type="button" aria-label="ページ上部へ戻る">
    <span aria-hidden="true">↑</span>
  </button>

  <script src="scripts/site-config.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
